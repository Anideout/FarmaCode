<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmaCode — QR System v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --accent: #08deea;
    --text: #c4ffff;
    --rx: #fd8090;
    --otc: #08deea;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 2rem 1.5rem; }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  header h1 span { color: var(--accent); }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid currentColor; align-self: flex-start; }
  .badge-rx { color: var(--rx); }
  .badge-otc { color: var(--otc); }

  .qr-container { background: white; padding: 12px; border-radius: 12px; display: flex; justify-content: center; align-items: center; min-height: 220px; }
  
  .meta { font-size: 11px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--border); padding-top: 12px; }
  .meta-row { display: flex; justify-content: space-between; }
  .meta-row span:first-child { opacity: 0.5; }

  .desc { font-size: 10px; opacity: 0.7; line-height: 1.4; font-style: italic; margin-top: 5px; }

  .btn-regen { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 30px; transition: transform 0.2s; }
  .btn-regen:hover { transform: scale(1.02); }
</style>
</head>
<body>

<header>
  <p style="font-size: 10px; letter-spacing: 2px; opacity: 0.5;">FARMACODE DATABASE INTERFACE</p>
  <h1>Generador <span>QR</span></h1>
  <p>Data extendida: Presentación, Laboratorio y Origen</p>
  <button class="btn-regen" onclick="generateAll()">Actualizar Base de Datos QR</button>
</header>

<div class="grid" id="grid"></div>

<script>
const medications = [
  { 
    nombre: "Paracetamol 500mg", principio: "Paracetamol", dosis: "500 mg", cat: "Analgésicos", tipo: "OTC",
    pres: "Caja x 20 Comprimidos", lab: "Bayer", pais: "Alemania", desc: "Alivio de dolores leves y fiebre."
  },
  { 
    nombre: "Amoxicilina 500mg", principio: "Amoxicilina", dosis: "500 mg", cat: "Antibióticos", tipo: "RX",
    pres: "Frasco Suspensión 60ml", lab: "GlaxoSmithKline", pais: "Reino Unido", desc: "Antibiótico de amplio espectro."
  },
  { 
    nombre: "Losartán 50mg", principio: "Losartán", dosis: "50 mg", cat: "Antihipertensivo", tipo: "RX",
    pres: "Caja x 30 Tabletas Recubiertas", lab: "Merck", pais: "EE.UU.", desc: "Tratamiento de la hipertensión arterial."
  },
  { 
    nombre: "Ibuprofeno 400mg", principio: "Ibuprofeno", dosis: "400 mg", cat: "Analgésicos", tipo: "OTC",
    pres: "Blister x 10 Cápsulas Blandas", lab: "Pfizer", pais: "EE.UU.", desc: "Antiinflamatorio no esteroideo (AINE)."
  },
  { 
    nombre: "Atorvastatina 20mg", principio: "Atorvastatina", dosis: "20 mg", cat: "Hipolipemiante", tipo: "RX",
    pres: "Caja x 28 Tabletas", lab: "Laboratorio Chile", pais: "Chile", desc: "Reducción de colesterol y triglicéridos."
  },
  { 
    nombre: "Metformina 850mg", principio: "Metformina", dosis: "850 mg", cat: "Antidiabético", tipo: "RX",
    pres: "Caja x 60 Comprimidos", lab: "Sanofi", pais: "Francia", desc: "Control de glucemia en Diabetes Tipo 2."
  },
  { 
    nombre: "Omeprazol 20mg", principio: "Omeprazol", dosis: "20 mg", cat: "Antiulceroso", tipo: "OTC",
    pres: "Frasco x 30 Cápsulas", lab: "AstraZeneca", pais: "Suecia", desc: "Protector gástrico y tratamiento de reflujo."
  },
  { 
    nombre: "Clonazepam 0.5mg", principio: "Clonazepam", dosis: "0.5 mg", cat: "Ansiolítico", tipo: "RX",
    pres: "Caja x 30 Tabletas Ranuradas", lab: "Roche", pais: "Suiza", desc: "Tratamiento de trastornos de pánico y ansiedad."
  }
];

function cleanText(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function generateAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  medications.forEach((med, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="badge ${med.tipo === 'RX' ? 'badge-rx' : 'badge-otc'}">${med.tipo}</div>
      <div>
        <h2 style="font-size: 18px; margin: 5px 0;">${med.nombre}</h2>
        <p style="font-size: 11px; opacity: 0.6;">${med.principio}</p>
      </div>
      <div class="qr-container" id="qr-${i}"></div>
      <div class="meta">
        <div class="meta-row"><span>Presentación:</span><span>${med.pres}</span></div>
        <div class="meta-row"><span>Laboratorio:</span><span>${med.lab}</span></div>
        <div class="meta-row"><span>Origen:</span><span>${med.pais}</span></div>
        <div class="meta-row"><span>Categoría:</span><span>${med.cat}</span></div>
        <p class="desc">${med.desc}</p>
      </div>
    `;
    grid.appendChild(card);

    setTimeout(() => {
      const container = document.getElementById(`qr-${i}`);
      // El String de datos ahora incluye los nuevos campos separados por pipes (|)
      const data = `${cleanText(med.nombre)}|${cleanText(med.principio)}|${cleanText(med.dosis)}|${cleanText(med.cat)}|${cleanText(med.pres)}|${cleanText(med.lab)}|${cleanText(med.pais)}|${cleanText(med.desc)}`;
      
      new QRCode(container, {
        text: data,
        width: 200,
        height: 200,
        correctLevel: QRCode.CorrectLevel.M // Nivel M para balancear densidad de datos y legibilidad
      });
    }, 50 + (i * 50));
  });
}

window.onload = generateAll;
</script>
</body>
</html>
