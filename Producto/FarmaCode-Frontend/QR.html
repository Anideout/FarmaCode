<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmaCode — QR de Medicamentos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --border: rgba(255,255,255,0.07);
    --accent: #08deea;
    --text: #c4ffff;
    --text-muted: rgba(196,255,255,0.45);
    --rx: #fd8090;
    --otc: #08deea;
  }

  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; padding: 2rem 1.5rem; }
  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  header h1 span { color: var(--accent); }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; position: relative; }
  .badge { font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid currentColor; align-self: flex-start; }
  .badge-rx { color: var(--rx); }
  .badge-otc { color: var(--otc); }

  .qr-container { background: white; padding: 15px; border-radius: 12px; display: flex; justify-content: center; align-items: center; min-height: 230px; }
  .meta { font-size: 12px; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid var(--border); padding-top: 10px; }
  .btn-regen { background: var(--accent); color: var(--bg); border: none; padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 30px; transition: opacity 0.2s; }
  .btn-regen:hover { opacity: 0.8; }
</style>
</head>
<body>

<header>
  <p style="font-size: 10px; letter-spacing: 2px; opacity: 0.5;">FARMACODE SYSTEM</p>
  <h1>Generador <span>QR</span></h1>
  <p>Escanea los códigos para agregar medicamentos a la App</p>
  <button class="btn-regen" onclick="generateAll()">Regenerar Todos los QR</button>
</header>

<div class="grid" id="grid"></div>

<script>
const medications = [
  { nombre: "Paracetamol 500mg", principio: "Paracetamol", dosis: "500 mg", cat: "Analgésicos", tipo: "OTC" },
  { nombre: "Amoxicilina 500mg", principio: "Amoxicilina", dosis: "500 mg", cat: "Antibióticos", tipo: "RX" },
  { nombre: "Losartán 50mg", principio: "Losartán", dosis: "50 mg", cat: "Antihipertensivo", tipo: "RX" },
  { nombre: "Ibuprofeno 400mg", principio: "Ibuprofeno", dosis: "400 mg", cat: "Analgésicos", tipo: "OTC" },
  { nombre: "Atorvastatina 20mg", principio: "Atorvastatina", dosis: "20 mg", cat: "Hipolipemiante", tipo: "RX" },
  { nombre: "Metformina 850mg", principio: "Metformina", dosis: "850 mg", cat: "Antidiabético", tipo: "RX" },
  { nombre: "Omeprazol 20mg", principio: "Omeprazol", dosis: "20 mg", cat: "Antiulceroso", tipo: "OTC" },
  { nombre: "Clonazepam 0.5mg", principio: "Clonazepam", dosis: "0.5 mg", cat: "Ansiolítico", tipo: "RX" }
];

// Función crucial: Elimina acentos para que la librería QR no falle
function cleanText(text) {
    return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function generateAll() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  medications.forEach((med, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="badge ${med.tipo === 'RX' ? 'badge-rx' : 'badge-otc'}">${med.tipo}</div>
      <div>
        <h2 style="font-size: 18px; margin: 5px 0;">${med.nombre}</h2>
        <p style="font-size: 11px; opacity: 0.6;">${med.principio}</p>
      </div>
      <div class="qr-container" id="qr-${i}">Generando...</div>
      <div class="meta">
        <div style="display:flex; justify-content:space-between;"><span>Dosis:</span><span>${med.dosis}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Categoría:</span><span>${med.cat}</span></div>
      </div>
    `;
    grid.appendChild(card);

    // Generar el QR con un pequeño delay
    setTimeout(() => {
      const container = document.getElementById(`qr-${i}`);
      if (container) {
        container.innerHTML = '';
        // Limpiamos los acentos antes de mandarlos al QR
        const data = `${cleanText(med.nombre)}|${cleanText(med.principio)}|${cleanText(med.dosis)}|${cleanText(med.cat)}`;
        
        try {
          new QRCode(container, {
            text: data,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } catch (e) {
          container.innerHTML = "<span style='color:red; font-size:10px;'>Error al generar</span>";
          console.error("Error en " + med.nombre, e);
        }
      }
    }, 100 + (i * 100));
  });
}

window.onload = generateAll;
</script>
</body>
</html>
